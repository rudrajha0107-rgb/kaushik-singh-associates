<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CA Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: #007bff;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        section {
            margin: 20px;
            padding: 20px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .service {
            animation: float 2s infinite;
            display: inline-block;
        }
        @keyframes float {
            0% { transform: translatey(0); }
            50% { transform: translatey(-10px); }
            100% { transform: translatey(0); }
        }
        .partners {
            margin-top: 30px;
            text-align: center;
        }
        .partner {
            display: inline-block;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Kaushik Singh Associates</h1>
    </header>
    <section>
        <h2>Our Services</h2>
        <div class="service">📊 Financial Advisory</div>
        <div class="service">📝 Tax Planning</div>
        <div class="service">📈 Investment Management</div>
        <div class="service">📚 Compliance Services</div>
    </section>
    <section class="partners">
        <h2>Our Partners</h2>
        <div class="partner">🤝 CA Nitin Kaushik</div>
    </section>
</body>
</html>
